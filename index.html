<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Нейро-организатор | AI для мероприятий</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Нейро-организатор</h1>
            <p>Ваш AI-помощник в планировании праздников</p>
        </header>

        <main>
            <form id="eventForm">
                <div class="form-group">
                    <label>🎉 Тип мероприятия:</label>
                    <select id="eventType" required>
                        <option value="birthday">День рождения</option>
                        <option value="corporate">Корпоратив</option>
                        <option value="wedding">Свадьба</option>
                        <option value="concert">Концерт</option>
                        <option value="party">Вечеринка</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>💰 Бюджет (₽):</label>
                    <input type="number" id="budget" placeholder="Например, 50000" required>
                </div>

                <div class="form-group">
                    <label>👥 Количество гостей:</label>
                    <input type="number" id="guests" placeholder="10-500" required>
                </div>

                <div class="form-group">
                    <label>🎨 Предпочтения / стиль:</label>
                    <input type="text" id="style" placeholder="Например: активный, классический, детский...">
                </div>

                <button type="submit">✨ Создать сценарий</button>
            </form>

            <div id="result" class="result hidden">
                <h2>📋 Ваш сценарий мероприятия</h2>
                <div id="scenarioText"></div>
                <button id="copyBtn" class="copy-btn">📋 Копировать текст</button>
            </div>
        </main>

        <footer>
            <p>⚡ Нейросеть генерирует сценарий за 3-5 секунд</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
